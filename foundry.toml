[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"

# Complex on-chain metadata was refactored so we compile without IR. Enabling `via_ir = true` currently
# triggers a solc Yul stack exception on this repo (“Variable … too deep in the stack”); keep false unless you split codegen further.
via_ir = false
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
